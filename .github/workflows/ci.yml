name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

services:
  mysql:
    image: mysql:8.0
    env:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: housing_app
    options: >-
      --health-cmd="mysqladmin ping"
      --health-interval=10s
      --health-timeout=5s
      --health-retries=3
    ports:
      - 3306:3306

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: housing_app
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m py_compile src/main.py
          python -m py_compile src/web/server.py
          python -m py_compile src/housing_scraper/storage.py
          python -m py_compile src/housing_scraper/migrations.py
          python -m py_compile src/housing_scraper/jwt_auth.py
          python -m py_compile src/worker/main.py
          python -m py_compile src/housing_scraper/observability.py

      - name: Run unit tests
        run: |
          pytest -q tests/test_jwt_auth.py tests/test_migrations_manager.py tests/test_api_auth_flow.py

      - name: Run integration tests
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DATABASE: housing_app
        run: |
          pytest -q tests/test_integration_db.py

      - name: Deploy to DigitalOcean App Platform
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: |
          # Install doctl
          wget https://github.com/digitalocean/doctl/releases/download/v1.100.0/doctl-1.100.0-linux-amd64.tar.gz
          tar xf doctl-*.tar.gz
          sudo mv doctl /usr/local/bin
          
          # Authenticate
          doctl auth init --access-token "$DIGITALOCEAN_TOKEN"
          
          # Deploy
          APP_ID=$(doctl apps list --format ID,Name --no-header | grep housing-platform | head -1 | awk '{print $1}')
          if [ -n "$APP_ID" ]; then
            doctl apps update "$APP_ID" --spec .do/app.yaml
            echo "Updated existing app: $APP_ID"
          else
            doctl apps create --spec .do/app.yaml
            echo "Created new app"
          fi
