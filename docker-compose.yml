version: "3.9"

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: housing_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
      AUTO_REFRESH_IN_WEB: "false"
    ports:
      - "8000:8000"

  worker:
    build: .
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      AUTO_REFRESH_ENABLED: "true"
    command: ["python", "src/main.py", "--platform", "worker"]

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro

volumes:
  mysql_data:
